name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: recruitment_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          if [ -f backend/pyproject.toml ]; then
            pip install -e backend/
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/recruitment_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing

  frontend-tests:
    name: Frontend Tests (Playwright)
    runs-on: ubuntu-latest
    # Skip until frontend package.json exists
    if: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true
